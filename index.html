<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>有无｜水晶串与木珠串</title>
    <meta
      name="description"
      content="有无，先做百元以内的水晶串和木珠串，搭建独立站购买与社媒承接框架。"
    />
    <link rel="stylesheet" href="styles.css?v=sourcing-22" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="#home" aria-label="有无首页" data-i18n-aria-label="brandHome">
        <span class="brand-logo">
          <strong data-i18n="brandName">有 無</strong>
        </span>
      </a>

      <nav class="main-nav" aria-label="主导航" data-i18n-aria-label="navLabel">
        <a href="#home" data-i18n="navShop">首页</a>
        <a href="#shop" data-i18n="navSets">全部</a>
        <a href="#shop" data-i18n="navCare">新品</a>
        <a href="#inquiry" data-i18n="navService">客服</a>
      </nav>

      <div class="header-actions">
        <div class="language-switch" role="group" aria-label="语言 / Language">
          <button class="is-active" type="button" data-language="zh" aria-pressed="true">中</button>
          <button type="button" data-language="en" aria-pressed="false">EN</button>
        </div>
        <button class="icon-button" type="button" data-search-focus aria-label="搜索商品" data-i18n-aria-label="searchAria">
          <span aria-hidden="true">⌕</span>
        </button>
        <button class="cart-button" type="button" data-cart-open aria-label="打开购物车" data-i18n-aria-label="cartOpen">
          <span aria-hidden="true" data-i18n="bagIcon">袋</span>
          <span class="cart-count" data-cart-count>0</span>
        </button>
      </div>
    </header>

    <main>
      <section class="intro-hero" id="home" aria-label="首页图片轮播" data-i18n-aria-label="heroSliderLabel">
        <div class="intro-slider" aria-label="首页图片轮播" data-i18n-aria-label="heroSliderLabel">
          <img class="intro-hero-image is-active" src="assets/product-crystal-test-02.jpg" alt="宁静绿色户外柔光氛围图：手腕佩戴清透绿水晶串" data-hero-slide data-i18n-alt="introAltOne" />
          <img class="intro-hero-image" src="assets/product-wood-test-02.jpg" alt="宁静苔石花园氛围图：手腕佩戴暖色木珠串" data-hero-slide data-i18n-alt="introAltTwo" />
        </div>
        <div class="hero-dots" aria-label="切换首页图片" data-i18n-aria-label="heroDotsLabel">
          <button class="is-active" type="button" data-hero-dot="0" aria-label="第 1 张首页图片"></button>
          <button type="button" data-hero-dot="1" aria-label="第 2 张首页图片"></button>
        </div>
      </section>

      <section class="shop-shell" id="shop" aria-labelledby="shop-title">
        <aside class="shop-rail" aria-label="店铺信息" data-i18n-aria-label="shopInfo">
          <p class="eyebrow" data-i18n="launch">FIRST DROP</p>
          <h1 id="shop-title" data-i18n="heroTitle">全部商品</h1>

          <dl class="trust-list">
            <div>
              <dt>88</dt>
              <dd data-i18n="inStock">意向价</dd>
            </div>
            <div>
              <dt data-i18n="sevenDays">手围</dt>
              <dd data-i18n="easyReturns">可备注</dd>
            </div>
            <div>
              <dt>客服</dt>
              <dd data-i18n="sizeAdvice">咨询确认</dd>
            </div>
          </dl>
        </aside>

        <section class="commerce-panel" aria-label="测试款选购" data-i18n-aria-label="commerceLabel">
          <div class="category-tabs" role="tablist" aria-label="拍品分类" data-i18n-aria-label="categoryLabel">
            <button class="tab is-active" type="button" data-category="all" data-i18n="categoryAll">全部</button>
            <button class="tab" type="button" data-category="crystal" data-i18n="categoryCrystal">水晶串</button>
            <button class="tab" type="button" data-category="wood" data-i18n="categoryWood">木珠串</button>
          </div>

          <div class="product-grid" data-product-grid></div>
          <p class="empty-state" data-empty data-i18n="empty" hidden>没有找到匹配的商品。</p>
        </section>
      </section>

      <section class="service-strip" id="service" aria-label="服务承诺" data-i18n-aria-label="serviceLabel">
        <span data-i18n="service1">水晶串 ￥88</span>
        <span data-i18n="service2">木珠串 ￥88</span>
        <span data-i18n="service3">支持备注手围</span>
      </section>

      <section class="lead-section" id="inquiry" aria-labelledby="lead-title">
        <div>
          <p class="eyebrow" data-i18n="leadLabel">SERVICE</p>
          <h2 id="lead-title" data-i18n="leadTitle">客服与下单咨询</h2>
        </div>
        <div class="lead-panel">
          <form class="lead-form" data-lead-form>
            <label>
              <span data-i18n="leadUse">用途</span>
              <select name="use">
                <option data-i18n="categoryCrystal">水晶串</option>
                <option data-i18n="categoryWood">木珠串</option>
              </select>
            </label>
            <label>
              <span data-i18n="leadBudget">预算</span>
              <input name="budget" type="text" placeholder="例：88" data-i18n-placeholder="leadBudgetPlaceholder" />
            </label>
            <label>
              <span data-i18n="leadContact">微信/邮箱</span>
              <input name="contact" type="text" placeholder="留下联系方式" data-i18n-placeholder="leadContactPlaceholder" required />
            </label>
            <button class="primary-button" type="button" data-save-lead data-i18n="leadSubmit">保存咨询需求</button>
          </form>
          <div class="lead-tools">
            <p data-lead-count data-i18n="leadCount">已保存 0 条测试需求</p>
            <button class="secondary-button" type="button" data-export-leads data-i18n="leadExport">导出线索 CSV</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="站点信息">
      <div>
        <strong data-i18n="footerBrand">有无 Void & Form</strong>
        <p data-i18n="footerNote">意向测试期：样品和材质确认前只收预约，不收正式货款。</p>
      </div>
      <nav aria-label="政策页面" data-i18n-aria-label="footerPolicyNav">
        <a href="privacy.html" data-i18n="footerPrivacy">隐私</a>
        <a href="shipping.html" data-i18n="footerShipping">物流</a>
        <a href="returns.html" data-i18n="footerReturns">退换</a>
        <a href="contact.html" data-i18n="footerContact">联系</a>
      </nav>
    </footer>

    <aside class="cart-drawer" data-cart-drawer aria-hidden="true">
      <div class="cart-backdrop" data-cart-close></div>
      <section class="cart-panel" aria-labelledby="cart-title">
        <header>
          <h2 id="cart-title" data-i18n="cartTitle">预约清单</h2>
          <button class="icon-button" type="button" data-cart-close aria-label="关闭购物车" data-i18n-aria-label="cartClose">×</button>
        </header>
        <div class="cart-items" data-cart-items></div>
        <div class="cart-summary">
          <div>
            <span data-i18n="subtotal">小计</span>
            <strong data-cart-total>￥0</strong>
          </div>
          <div class="cart-progress" data-cart-progress></div>
          <p data-i18n="cartNote">样品通过后才开放正式付款。现在复制预约内容并去品牌 Instagram 私信。</p>
          <a class="primary-button full" href="https://www.instagram.com/duck.3428348/" data-checkout data-i18n="checkout">去 Instagram 私信预约</a>
        </div>
      </section>
    </aside>

    <dialog class="product-dialog" data-product-dialog>
      <button class="icon-button dialog-close" type="button" data-dialog-close aria-label="关闭详情" data-i18n-aria-label="dialogClose">×</button>
      <div class="dialog-body" data-dialog-body></div>
    </dialog>

    <div class="toast" data-toast role="status" aria-live="polite"></div>

    <nav class="mobile-tabbar" aria-label="底部导航" data-i18n-aria-label="bottomNavLabel">
      <a href="#home"><span>⌂</span><strong data-i18n="bottomHome">首页</strong></a>
      <a href="#shop"><span>☰</span><strong data-i18n="bottomCategory">分类</strong></a>
      <button type="button" data-cart-open><span>▱</span><strong data-i18n="bottomCart">预约</strong></button>
      <a href="#inquiry"><span>☏</span><strong data-i18n="bottomService">客服</strong></a>
    </nav>

    <script src="script.js?v=sourcing-22"></script>
  </body>
</html>
