<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>TikTok 授权返回</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f7f4;color:#171714;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
    main{width:min(86vw,420px);border:1px solid #d8d8d2;background:#fff;padding:28px}
    h1{font-size:22px;margin:0 0 12px}p{color:#5a5a54;line-height:1.7}a{color:#171714;font-weight:700}
  </style>
</head>
<body>
  <main>
    <h1>正在完成 TikTok 授权</h1>
    <p>授权结果只会发送到你电脑上的有无管理后台，本页不保存访问凭证。</p>
    <p><a id="fallback" href="http://127.0.0.1:4174/api/oauth/tiktok/callback">没有自动返回时点这里</a></p>
  </main>
  <script>
    const target = new URL("http://127.0.0.1:4174/api/oauth/tiktok/callback");
    for (const [key, value] of new URLSearchParams(location.search)) target.searchParams.append(key, value);
    document.getElementById("fallback").href = target.toString();
    location.replace(target.toString());
  </script>
</body>
</html>
