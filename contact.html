<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />

    <title>联系我们｜有无</title>
    <meta name="description" content="有无测试期独立站联系页面，用于商品咨询、手围备注、订单和售后沟通。" />
    <link rel="stylesheet" href="styles.css?v=conversion-21" />
  </head>
  <body>
    <header class="site-header policy-header">
      <a class="brand" href="index.html#home" aria-label="有无首页">
        <span class="brand-logo"><strong>有 無</strong></span>
      </a>
      <nav class="main-nav" aria-label="政策导航">
        <a href="index.html#shop">商品</a>
        <a href="privacy.html">隐私</a>
        <a href="shipping.html">物流</a>
        <a href="returns.html">退换</a>
      </nav>
    </header>
    <main class="policy-main">
      <section class="policy-hero">
        <p class="eyebrow">CONTACT</p>
        <h1>联系我们</h1>
        <p>测试期先通过站内咨询表单和购物袋意向收集需求。正式客服微信、邮箱和回复时段确认后，会更新到本页。</p>
      </section>
      <section class="policy-grid">
        <article>
          <h2>商品咨询</h2>
          <p>可在首页“客服与下单咨询”留下水晶串或木珠串需求、预算和联系方式。</p>
        </article>
        <article>
          <h2>下单备注</h2>
          <p>建议备注手围、佩戴松紧偏好、用途和是否送礼，方便后续确认尺寸和包装。</p>
        </article>
        <article>
          <h2>售后信息</h2>
          <p>售后沟通请保留商品照片、发货单、快递单号和问题描述。后台会按货单记录处理进度。</p>
        </article>
        <article>
          <h2>正式客服</h2>
          <p>正式客服账号、邮箱、服务时段和商家主体信息待确认后公开。</p>
        </article>
      </section>
      <p class="policy-updated">更新时间：2026-06-28</p>
    </main>
